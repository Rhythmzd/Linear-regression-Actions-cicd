name: Train Model and Create Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  train-and-package:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run model tests
      run: python test_model.py
      
    - name: Train model
      run: python train_model.py
      
    - name: Display model info
      run: |
        echo "=== Model Training Results ==="
        cat linear_model.txt
        echo "=== Model File Info ==="
        ls -la linear_model.pkl
        
    - name: Create model package
      run: |
        mkdir -p model_package
        cp linear_model.pkl model_package/
        cp linear_model.txt model_package/
        cp training_data.csv model_package/
        cp train_model.py model_package/
        cp test_model.py model_package/
        cp requirements.txt model_package/
        
    - name: Upload model artifacts
      uses: actions/upload-artifact@v3
      with:
        name: linear-regression-model-${{ github.run_number }}
        path: model_package/
        retention-days: 90

  create-release:
    needs: train-and-package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download model artifacts
      uses: actions/download-artifact@v3
      with:
        name: linear-regression-model-${{ github.run_number }}
        path: model_package/
        
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        name: "Linear Regression Model ${{ github.event.inputs.version || 'Latest' }}"
        body: |
          ## Linear Regression Model Release
          
          **Release Date**: ${{ github.event.head_commit.timestamp }}
          **Commit**: ${{ github.sha }}
          **Workflow Run**: #${{ github.run_number }}
          
          ### Model Performance
          - High performance model for salary prediction
          - Training Data: Experience vs Salary dataset
          
          ### Package Contents
          - linear_model.pkl: Trained linear regression model
          - linear_model.txt: Model coefficients and intercept
          - training_data.csv: Original training dataset
          - train_model.py: Model training script
          - test_model.py: Model validation script
          - requirements.txt: Python dependencies
          
          ### Quick Start
          Install dependencies: pip install -r requirements.txt
          Test the model: python test_model.py
          
          This release was automatically created by GitHub Actions.
        files: |
          model_package/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
